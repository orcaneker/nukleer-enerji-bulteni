<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arşiv — Nükleer Enerji Bülteni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --kagit:#F7F5F0; --panel:#FFFFFF; --cizgi:#D8D3C8; --cizgi-soft:#E5E1D8;
  --murekkep:#0B2239; --govde:#33475C; --soluk:#5B6B7C; --dim:#94A0AC;
  --cerenkov:#2E9BD6; --cerenkov-koyu:#1B7AB0;
  --serif:"Source Serif 4",Georgia,serif;
  --display:"Fraunces",Georgia,serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--kagit);color:var(--murekkep);font-family:var(--serif);
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto;padding:0 24px}
a{color:var(--cerenkov-koyu)}
.cetvel{background:var(--murekkep);color:#B9C6D2;font-family:var(--mono);
  font-size:11px;letter-spacing:.08em;padding:7px 24px}
header{border-bottom:2px solid var(--murekkep);padding:30px 0 18px}
.ust{font-family:var(--mono);font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--cerenkov-koyu);margin-bottom:4px}
h1{font-family:var(--display);font-weight:700;font-size:clamp(26px,4vw,38px)}
h1 em{font-style:italic;font-weight:400;color:var(--cerenkov-koyu)}
.geri{font-family:var(--mono);font-size:12px;margin-top:10px;display:inline-block;
  color:var(--soluk);text-decoration:none}
.geri:hover{color:var(--cerenkov-koyu)}
.liste{padding:26px 0 60px}
.sayi{display:grid;grid-template-columns:110px 1fr auto;gap:20px;align-items:baseline;
  padding:18px 0;border-bottom:1px solid var(--cizgi-soft);text-decoration:none;
  color:var(--murekkep)}
.sayi:hover h2{color:var(--cerenkov-koyu)}
.no{font-family:var(--mono);font-size:12px;color:var(--soluk)}
.no b{display:block;font-size:16px;color:var(--murekkep);font-weight:600}
.sayi h2{font-family:var(--display);font-weight:600;font-size:19px;line-height:1.3;
  transition:color .15s}
.sayi .m{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:right;
  white-space:nowrap}
.bos{padding:70px 0;text-align:center;font-family:var(--mono);color:var(--soluk)}
@media(max-width:640px){.sayi{grid-template-columns:1fr}.sayi .m{text-align:left}}
</style>
</head>
<body>
<div class="cetvel">NÜKLEER ENERJİ BÜLTENİ — SAYI ARŞİVİ</div>
<header><div class="wrap">
  <div class="ust">Haftalık İzleme Raporu</div>
  <h1>Arşiv <em>— geçmiş sayılar</em></h1>
  <a class="geri" href="./">← Güncel sayıya dön</a>
</div></header>

<main class="wrap"><div class="liste" id="liste">
  <div class="bos">Arşiv yükleniyor…</div>
</div></main>

<script>
function trTarih(iso){
  if(!iso) return "—";
  const ay=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const d=new Date(iso+"T00:00:00");
  return `${d.getDate()} ${ay[d.getMonth()]} ${d.getFullYear()}`;
}
function esc(s){const d=document.createElement("div");d.textContent=s??"";return d.innerHTML;}

fetch("data/index.json").then(r=>r.json()).then(sayilar=>{
  const el=document.getElementById("liste");
  if(!sayilar.length){ el.innerHTML='<div class="bos">Henüz yayınlanmış sayı yok.</div>'; return; }
  el.innerHTML=sayilar.map(s=>`
    <a class="sayi" href="./?hafta=${esc(s.hafta)}">
      <span class="no"><b>SAYI ${s.number}</b>${esc(s.hafta)}</span>
      <h2>${esc(s.lead_title)}</h2>
      <span class="m">${trTarih(s.publication_date)}<br>${s.story_count} haber · ${s.radar_count} radar</span>
    </a>`).join("");
}).catch(()=>{
  document.getElementById("liste").innerHTML=
    '<div class="bos">Arşiv verisi yüklenemedi.</div>';
});
</script>
</body>
</html>
